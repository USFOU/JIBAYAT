version: '3.8'

services:
  jibayat_app:
    build: .
    container_name: jibayat_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # SQLite db - attention, si le fichier n'existe pas, Docker crée un dossier. 
      # Il est recommandé de créer le fichier vide avant, ou d'utiliser un dossier de data dédié.
      # Pour l'instant on garde le nom direct.
      - jibayat_db:/app/fiscalite.db
      - jibayat_uploads:/app/uploads
      - jibayat_exports:/app/static/exports
    environment:
      - FLASK_ENV=production

volumes:
  jibayat_db:
  jibayat_uploads:
  jibayat_exports:
