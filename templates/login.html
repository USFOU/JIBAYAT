<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — JIBAYAT</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    color: #fff;
}

/* Background Animated Gradient & Orbs */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, #854d0e 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, #020617 100%);
    z-index: 0;
}
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 1;
    animation: floatOrb 25s infinite alternate ease-in-out;
}
.orb-1 { width: 500px; height: 500px; background: rgba(59, 130, 246, 0.18); top: -150px; left: -150px; }
.orb-2 { width: 600px; height: 600px; background: rgba(234, 179, 8, 0.12); bottom: -250px; right: -150px; animation-delay: -5s; }
@keyframes floatOrb {
    100% { transform: translate(150px, 100px); }
}

/* Glassmorphism Card */
.login-box {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 100%;
    max-width: 440px;
    border-radius: 28px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    padding: 45px 40px;
    transform: translateY(30px);
    opacity: 0;
    animation: fadeUp 0.9s forwards cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeUp {
    to { transform: translateY(0); opacity: 1; }
}

/* Header */
.login-header {
    text-align: center;
    margin-bottom: 35px;
}
.logo-icon {
    font-size: 4rem;
    margin-bottom: 8px;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    animation: floatIcon 6s ease-in-out infinite;
    display: inline-block;
}
@keyframes floatIcon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
.login-header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #ffffff 0%, #eab308 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.login-header p {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
}

/* Form */
.form-group {
    margin-bottom: 22px;
    position: relative;
}
.form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-bottom: 8px;
    transition: color 0.3s;
}
.form-group:focus-within label {
    color: #eab308;
}
.input-wrapper {
    position: relative;
}
.input-wrapper svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    fill: none;
    stroke: rgba(255,255,255,0.4);
    stroke-width: 2;
    transition: stroke 0.3s;
}
.form-group:focus-within .input-wrapper svg {
    stroke: #eab308;
}
.form-group input {
    width: 100%;
    padding: 15px 16px 15px 46px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    font-size: 0.95rem;
    color: #fff;
    font-family: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.form-group input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}
.form-group input:focus {
    outline: none;
    border-color: rgba(234, 179, 8, 0.5);
    background: rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.15);
}

/* Button */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
    color: #000;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 10px;
    box-shadow: 0 10px 25px rgba(202, 138, 4, 0.25);
    position: relative;
    overflow: hidden;
}
.btn-login::after {
    content: "";
    position: absolute;
    top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-25deg);
    transition: none;
}
.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(202, 138, 4, 0.4);
}
.btn-login:hover::after {
    animation: shine 0.7s forwards;
}
@keyframes shine {
    100% { left: 200%; }
}

/* Alert */
.alert {
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    padding: 14px;
    border-radius: 12px;
    font-size: 0.85rem;
    margin-bottom: 24px;
    border: 1px solid rgba(239, 68, 68, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Decoration */
.commune-badge {
    position: absolute;
    bottom: 25px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    z-index: 1;
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-box">
  <div class="login-header">
    <div class="logo-icon">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo Commune" style="width: 100px; height: 100px; object-fit: contain; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); padding: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
    </div>
    <h1>JIBAYAT</h1>
    <p>Système Intégré de Gestion Fiscale</p>
  </div>
  
  <div class="login-body">
    {% if error %}
    <div class="alert">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      {{ error }}
    </div>
    {% endif %}
    
    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label>Identifiant / Email</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input type="email" name="email" required autofocus placeholder="admin@commune.ma" value="admin@commune.ma">
        </div>
      </div>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input type="password" name="password" required placeholder="••••••••" value="admin123">
        </div>
      </div>
      
      <button type="submit" class="btn-login">Accéder à l'espace sécurisé</button>
    </form>
  </div>
</div>

<div class="commune-badge">
    ROYAUME DU MAROC — MINISTÈRE DE L'INTÉRIEUR<br>
    <strong style="color: #eab308; font-size: 0.95rem; margin-top: 6px; display: inline-block; letter-spacing: 3px;">
      {{ commune_nom|upper if commune_nom else 'COMMUNE' }}
    </strong>
</div>

</body>
</html>
